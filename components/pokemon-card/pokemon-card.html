<template id="pokemonCardTemplate">
    <article class="pokemon-card">
        <img class="pokemon-card__image" alt="Imagen del Pokémon">

        <div class="pokemon-card__body">
            <h3 class="pokemon-card__name"></h3>
            <p class="pokemon-card__id"></p>
            <p class="pokemon-card__type"></p>
        </div>

        <button class="pokemon-card__button" type="button">
            Ver detalle
        </button>
    </article>
</template>
