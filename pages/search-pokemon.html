<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscar Pokémon</title>
    <link rel="stylesheet" href="../css/page/search-pokemon.css">
    <link rel="stylesheet" href="../components/toast.css">
    <script type="module" src="../js/controllers/get-pokemon-page.contoller.js"></script>
</head>
<body>
    <div class="search-container">
        <h1>Buscar por nombre</h1>
        <input type="text" id="searchInput" placeholder="Ingrese el nombre del Pokémon...">
        <button id="searchButton">Buscar</button>
    </div>

    <div id="resultsContainer" class="results-container">
        <h2>Resultados</h2>
        <div class="pokemon-info">
            <h3 id="pokemonName" class="pokemon-name">Nombre del Pokémon</h3>
            <img id="pokemonImage" class="pokemon-img" alt="Imagen del Pokémon">
            <div class="pokemon-type">
                <span id="pokemonType" class="badge normal">No definido</span>
            </div>
            <p id="pokemonId" class="pokemon-id">ID:</p>
            <p id="pokemonHeight" class="pokemon-height">Altura:</p>
            <p id="pokemonSkills" class="pokemon-skills">Habilidades:</p>
        </div>
    </div>
    <div id="toastContainer"></div>
</body>
</html>
